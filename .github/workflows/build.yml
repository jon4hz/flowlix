name: build

on:
  push:
    branches: [main, master]
  pull_request:

permissions: {}

jobs:
  build:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (with submodule source)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: recursive
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Build binary in container
        run: ./scripts/build-in-docker.sh
        env:
          CONTAINER_ENGINE: docker

      - name: Sanity-check the artifact
        run: |
          file prebuilt/linux_amd64/FlowtoysUpdater
          test -x prebuilt/linux_amd64/FlowtoysUpdater

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: FlowtoysUpdater-linux-amd64
          path: prebuilt/linux_amd64/FlowtoysUpdater
